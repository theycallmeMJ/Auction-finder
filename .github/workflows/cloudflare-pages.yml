name: Refresh BAANKNET data and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

concurrency:
  group: baanknet-refresh
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh upcoming auctions
        env:
          BAANKNET_STATUSES: upcoming
          BAANKNET_INCREMENTAL: "1"
          BAANKNET_ENRICH_DETAILS: "1"
          BAANKNET_ENRICH_LIMIT: "2000"
          BAANKNET_SCORE: "1"
        run: python3 scripts/scrape_baanknet.py

      - name: Push refreshed data to Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_REPLACE_STATUS_ROWS: "1"
        run: python3 scripts/push_to_supabase.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          if git diff --cached --quiet; then
            echo "No refreshed data changes to commit."
            exit 0
          fi
          git commit -m "Refresh BAANKNET auction data"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Build Cloudflare Pages output
        env:
          NEXT_PUBLIC_FREE_PROTECTED_ACTIONS: "10"
          VITE_FREE_PROTECTED_ACTIONS: "10"
          NEXT_PUBLIC_AUTH_REDIRECT_URL: "https://kerala-auction-finder.pages.dev"
          VITE_AUTH_REDIRECT_URL: "https://kerala-auction-finder.pages.dev"
        run: pnpm run pages:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-pages --project-name kerala-auction-finder
